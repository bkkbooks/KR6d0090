body:
  text: 清東歐釋氏曉柔廣和標科序品科釋經文分為二初釋題分文二依文釋義二初迹門三初序分二初品題二正文二初通序五初所聞法體二能聞之人三説經時分四説經處所五同聞伴侶四初聲聞衆二初比丘二初總明五初明類二舉數三論位四歎德五列名二初別列二十一位二總指萬二千人二別舉二尼衆二菩薩衆五初明類二舉數三顯位四歎德二初總歎二別歎五列名二初別列二總結三雜類衆七初諸天衆二初欲界二色界二龍王衆三緊那羅四乾闥婆五阿修羅六迦樓羅七人王衆四結衆集二別序二正宗三流通二本門二別序五初衆集序二現瑞序二初此土瑞相六初説法二入定三雨華四動地五衆喜六放光二他土瑞相二初見十種法界二見五時法化三疑念序二初彌勒疑三初疑六瑞二疑問誰三疑文殊二大衆疑二初疑瑞相二疑問誰四問答序二初彌勒發問二初長行總問二重頌別問二初正問二初頌此土瑞二頌地土瑞二初頌十種法界二頌五時法化二初頌前二時二初華嚴二阿含三初明聲聞二明緣覺三明菩薩二頌後三時二初結前生後二初結前二生後二次第陳問二初總問二別問三初次第問方等六初問檀二問尸三問忍四問進五問禪六問慧二初自行二化他二不次第問般若七初問禪二問進三問尸四問忍五又禪六問檀七問慧三問如來涅槃二初總明二別明二結請二初標意二請答二文殊酬答五結判文殊酬答二文殊酬答二初長行三初惟忖二證驗二初總驗二別驗三初明最初一佛三初舉時分二出佛號三明説法三初説頓教同二説漸法同三會圓教同二明中二萬佛三明最後一佛三初明已同二明今同二初現瑞同二初此土六瑞與今佛同二他土六瑞與今佛同二疑念同三明當同三初顯同七初因人同二説法同三時節同四唱滅同五授記同六滅後同七通經同二釋疑二初釋文殊與釋迦疑二釋彌勒與文殊疑三結會三結判二偈頌二偈頌二初頌證驗二初頌最初一佛二頌最後一佛三初頌已同二頌今同二初頌現瑞同二初頌此土瑞二頌他土瑞二初頌見十種法界二初頌六趣凡夫二頌佛説三乘二頌見五時法化二頌疑念同三頌當同三初頌顯同七初頌因人同二頌説法同三頌時節同四頌唱滅同五頌授記同六頌滅後同七頌通經同二頌釋疑二初頌釋文殊與釋迦疑二頌釋彌勒與文殊疑三頌結會二頌結判四初答名目二答理體三答宗要四答力用方便品科品文大分為二初經家敘二如來歎二初略開權顯實二初正略開顯二初長行二初歎權實智二初歎諸佛二智三初歎二釋三結二歎釋迦二智三初歎二釋三結二歎權實境四初明如來之所説二明如來之所證三明如來全證衆生之所具四明衆生全具如來之所證二偈頌二初正頌四初頌權實智二頌權實境三頌其不知二初揀能知二揀不知二初揀二乘二初總揀二別揀二初揀聲聞二揀辟支二揀菩薩二初揀新發意二揀不退轉四頌其能知二開顯二初略顯實二略開權二騰疑致請二廣開權顯實二騰疑致請三初約疑念請二初當機請二初長行二初經家敘疑二當機正問三初正發問二述問意三請説法二偈頌三初頌正發問二頌述問意三頌請説法二如來止二約根種請二初長行二初正請二出意二偈頌二初頌正請二頌出意三約受化請二初標明止意二初長行二偈頌二正明受化二初長行二初正請二出意二偈頌二初頌正請二頌出意已上略開顯竟二廣開權顯實三初法説五初如來正説二初長行三初許説三初順許二誡許三正許二初經家敘退二初標敘二出意二如來揀許二初正揀二更許二受旨三正説三初歎法妙二誡不虗三正開顯三初總明諸佛二初正明諸佛三初開權顯實六初標定二釋明三正釋四反徵五轉解六結名二為實施權三廢權立實二結顯十方二別明三世二初正別明三初過去二未來三現在二結其意三重明釋迦四初開權顯實二申明方便三初標意二示相三初標二列三釋三結顯三敦逼令信二初揀非弟子二斥為上慢四初正斥二釋明三姑縱四釋疑四誠無虗妄二偈頌四初頌退席二頌在會三頌許説四頌正説三初頌總明諸佛四初頌開權顯實二初明諸佛開權二初開權二出意二明釋迦顯實二初敘意二正顯三初約別教顯二約通教顯三約藏教顯二頌為實施權三頌廢權立實四頌勸信不虗三初正勸信二初舉心色勸二舉誓願勸二舉五濁三初標意二示相三結顯三結不虗二頌別明三世三初頌過去二初頌略開顯二頌廣開顯二初總標二別示二初約緣因明開顯三初約菩薩二約二乘三約人天三初明起塔二明造像三明供養三初意業二身業三口業二約了因明開顯二頌未來三初頌開權顯實二初正明二出意二頌為實施權二初正明二出意三頌廢權立實三頌現在三初頌開權顯實二頌為實施權三頌廢權立實三頌重明釋迦二初頌略開顯二頌廣開顯四初頌申明方便二初示相二出意二頌開權顯實二初開權二初隱實二初大乘擬宜二初三七思惟二諸天請轉二無機息化二施權二初念同諸佛二初釋迦正念二諸佛愍喻二初歎同二出意二隨順施小三初隨順二施小三釋疑二顯實二初明大乘機發二明如來演説四初作念二揀機三正説四結益三頌歎法希有二初頌如是法妙二頌時乃説之二初法二喻三合四頌勸信不虗三初頌正勸二頌敦逼三頌結顯二當機陳領三如來述成四上根得記五四衆歡喜二喻説三因緣説二當機陳領二初長行二初經家敘相二身子陳詞三初標陳所領二釋明所解二初正釋二初正敘昔迷二重約處所二轉解三通共結歸二偈頌三初頌標陳所領二頌釋明所解四初明迷中迷二明迷中悟三明悟中