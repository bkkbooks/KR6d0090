body:
  text: 新刻法華演義序昔釋迦如來說法四十九年惟法華一經稱純圓獨妙者夫亦以時則卓午以味則醍醐也不說之於四十年以前時未至機未熟而說之於四十年之後權可廢實可立歸九界於佛界會三乘於一乘則此經之深固幽遠非兼但對帶之所可比擬詎言說文辭之所可䟦及乎雖然經之義蘊不詮發則不明經之宗旨不闡揚則不顯若非用世語言何以助宣佛法是故陳隋以來注釋者不一家而以辨才分疏者惟天台為獨步南嶽謂天台曰法華三昧非子莫證非我莫識縱有文字之師千百莫能窮汝之辨是南嶽與天台固同聽法華自靈山中來也厥後唐之荊溪僅為釋籤宋之溫陵第有要解至於元有科注之刻不加己見而仍以天台成言為注述焉自有明以迨國朝又有會義授手指掌等書雖曰唯佛與佛乃能究盡而能明經義顯經旨者皆如來使也東甌曉柔法師寢饋於法華有年矣談經五會講席大開今將一松大師遺稿分科列段訂訛補殘經疏義符文成完璧茲欲壽諸梨棗過余一商余觀誦之見其詮發經義明辨以晳昭昭乎如卓午之時也闡揚經旨純粹以精津津乎有醍醐之味也珠聯脉貫膚去液存略前人之所詳詳前人之所略深也而以淺出之幽也而以明表之適應時機的為善本其於古德何多讓焉大凡經籍之流傳有數存焉於其間使當日松師之本不入於曉柔法師之手則此本必湮沒不傳矣即或置之篋中若無閱藏因緣未必為之編訂則此本亦終殘缺無成矣由是觀之曉柔法師誠為一松大師之後身也莫為之前雖美弗彰莫為之後雖盛弗傳其斯之謂與之二師者後先接續相與有成何嘗非如來之所遣使法師品云我滅度後能竊為一人說法華經乃至一句當知是人則如來使如來所遣行如來事何況廣演此經解說其義也後之學者得是書而讀之悉知諸法實相自能入佛知見矣又何患不得一切種智也然則二師法施之功德真有不可說不可說者夫豈余一人之私言哉光緒戊寅夏三一居士吳鄭衡謹書新刻法華演義序法華演義者乃一松大師之講錄也師不知何許人亦未明其時代姑置弗考聞夫菩薩發心有願居先得意無心為本此六字乃夢中所見心空則旨徹願立則道成然後談空意不在空說有心本非有心本非有有即妙有意不在空空乃真空真空不空諸佛之教觀興也妙有非有眾生之執見化焉誡以凡類昏迷四生不出佛家證得二死永亡是知如來雖示生周代復入涅槃者其實久成正覺常住世間故此經如來壽量品云我成佛已來甚大久遠壽命無量阿僧祇劫常住不滅我本行菩薩道所成壽命今猶未盡大寶積經六十三本事品云佛告諸比丘過去阿僧祇不可思議無始世界不可說劫有因陀幢如來出現於世汝知誰也諸比丘默然無答爾時文殊師利從東方月光莊嚴國來白佛言世尊昔時因陀幢如來即今世尊也何以故由世尊具足不可思議諸善方便成熟眾生已於過去世曾作八億佛無心取正覺更於未來世示現無量佛大矣哉不可思議者如來之神變也如夢中事無古無今如鏡中像非實非虗如水中月不有不無如畫中人靡來靡去無古無今以心印心心心不異非實非虗卷之無縱舒之無量不有不無取之非得捨之非離靡來靡去佛身常住始終不遷故一切眾生從無始以前至未來以後常住佛身之中亦未曾動易所以菩薩長時自利利人彼此終歸一致積劫益生自益物我究竟雙忘儻有一毫法非是道者便成障礙則法華實相不得圓滿是以如來復為一大事因緣故出現於世以暢本懷始自乳味終於醍醐雖各乘其時未曾說諸法實相者由其機未熟故佛教未圓乳味雖頓仍歸兼說三藏所詮全是生滅方等尚對彈斥熟味猶帶淘汰當涅槃雖同味又說追泯故唯有此經乃純圓獨玅若有聞法者無一不成佛九界同歸三乘咸會如來大事因緣自此而明出世本懷自此而暢故稱為玅法也由法玅故其旨非同非異故天台大師於大蘇嶺證三昧後提其綱挈其領弘此玅經廣之三大部是乃愈同愈異也後釋籤玅樂乃至此書等終歸王城玅旨是乃愈異愈同也如是厥義重重包含實有出於不可思議者然此講錄之稿原於咸豐八年間東甌寂光寺宇堅老人逝世一切經書散盡唯留是稿雖得全部盡殘朽矣內無正文科未另出惜當時門人靈述囑康世居士轉錄者字多錯失然和猶愛若神珠剎那寶護恒佩於身不離雲水願至顧命遺囑高明遂使寢饋間不捨此愛也迨光緒丙子夏住古越傳燈寺閱藏有法華授手一編乃我國朝選入因此想松師講錄之稿可與頡頏儻或失傳有負松師一生願力血滴心腸又負諸賢久望指南不知歸趣然於是稿起首不得而又不能放下至於仲冬三日沐浴焚香祝願下筆念念於心至十二日思窮慮絕夜夢白光徧照似有聲云得意無心為本六字分明顯著於前和寤時忽覺快暢罪慶交懷嗟乎實自愧矣毫無梵行敢希聖應良繇愍和劣智大事難成故垂慈冥被始可尅終此實直言並非妄語所以十住斷結經云上方安寂世界妙識如來隨眾生根權現吉祥睡相眾生效之即為夢中神識說法凡有受化得悟乃至成道者皆於夢中而作佛事今和亦復如是幸此因緣故將是稿繁者刪之錯者訂之失者補之欠者足之且以科緒攜出排定將正文列入以講錄分疏其下令閱者朗若列眉緣有正文不得仍名講錄也故易之曰演義付剞劂氏廣為流通未來同學者見此聞此莫泥句下生機發解各得開示悟入佛之知見了諸佛之所證乃眾生之本具未發菩提心令速發心已發菩提心令永不退於無上菩提已得不退者令速圓滿所願傳傳不已佛日從是增輝代代尊崇法輪自此常轉原從鷲嶺延至龍華故序其緣起如此時維大清光緒二年歲次丙子仲冬穀旦東甌釋氏卍蓮子曉柔稽首謹序於古越傳燈寺之藏經樓法華經演義目次卷首序科卷第一卷第一之一弘傳序序品第一卷第二卷第一之二序品之餘卷第三卷第一之三方便品第二卷第四卷第一之四方便品之餘卷第五卷第二之一譬喻品第三卷第六卷第二之二譬喻品之餘卷第七卷第二之三信解品第四卷第八卷第三之一藥草喻品第五卷第九卷第三之二藥草喻品之餘授記品第六化城喻品第七卷第十卷第三之三化城喻品之餘卷第十一卷第四之一五百弟子受記品第八授學無學人記品第九法師品第十卷第十二卷第四之二法師品之餘見寶塔品第十一卷第十三卷第四之三提婆達多品第十二持品第十三卷第十四卷第五之一安樂行品第十四卷第十五卷第五之二安樂行品之餘從地湧出品第十五如來壽量品第十六卷第十六卷第五之三如來壽量品之餘分別功德品第十七卷第十七卷第六之一隨喜功德品第十八常不輕菩薩品第二十卷第十八卷第六之二如來神力品第二十一囑累品第二十二藥王菩薩本事品第二十三卷第十九卷第七之一妙音菩薩品第二十四觀世音菩薩普門品第二十五卷第二十卷第七之二陀羅尼品第二十六妙莊嚴王本事品第二十七普賢菩薩勸發品第二十八法華經演義目次終
